<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ purpose }}</title>
</head>
<body style="
margin: 0;
padding: 0;
font-family: Arial, Helvetica, sans-serif;
font-size: 16px;
">
    <table align="center" width="500px">
        <tr>
            <td>
                <table>
                    <tbody>
                        <tr>
                            <td>
                                <p>Hi {{ username }},</p>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <p>Please click on the link below to confirm your request.</p>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <a 
                                href="{{ url }}"
                                target="_blank"
                                style="
                                display: inline-block;
                                margin: 30px 0;
                                padding: 15px 40px;
                                border-radius: 5px;
                                font-size: 20px;
                                background-color: #097969;
                                color: white;
                                text-decoration: none;
                                word-break: break-all;">
                                    {{ content }}
                                </a>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <p><b>This link expires within {{ expiry }}.</b></p>
                            </td>
                        </tr>
                        <tr>
                            <td>
                                <p>If you didn't request this, safely disregard this email.</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
